<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flovr v2.0 — Aufbau-Checkliste</title>
<style>
  :root {
    --bg: #0A1A1A;
    --surface: #0d2020;
    --surface2: #0f2828;
    --border: #0D3A38;
    --purple: #07908E;
    --purple-light: #0ABFBC;
    --pink: #4DD9D7;
    --pink-dim: #0ABFBC;
    --text: #D8EFEF;
    --text-dim: #5A8888;
    --done-bg: #0a1a10;
    --done-text: #3a5a4a;
    --green: #4ade80;
    --warn: #f59e0b;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  header {
    background: linear-gradient(135deg, #062828 0%, #0A1A1A 60%);
    border-bottom: 1px solid var(--border);
    padding: 28px 32px 24px;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .logo { display: flex; align-items: center; gap: 12px; }

  .logo-dot {
    width: 32px; height: 32px;
    background: linear-gradient(135deg, #07908E, #0ABFBC);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 900; color: white;
  }

  .logo h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  .logo span { color: var(--text-dim); font-weight: 400; font-size: 14px; margin-left: 4px; }

  .version-tag {
    font-size: 11px; padding: 2px 8px; border-radius: 10px;
    background: rgba(10,191,188,0.12); color: #0ABFBC;
    border: 1px solid rgba(10,191,188,0.25); font-weight: 600;
  }

  .stats { display: flex; gap: 20px; align-items: center; }
  .stat { text-align: right; }
  .stat-num { font-size: 22px; font-weight: 700; color: var(--pink); line-height: 1; }
  .stat-label { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }

  .progress-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar { height: 100%; background: linear-gradient(90deg, #07908E, #4DD9D7); border-radius: 4px; transition: width 0.4s ease; min-width: 2px; }

  .section-nav {
    display: flex; gap: 4px;
    padding: 12px 32px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    overflow-x: auto; scrollbar-width: none;
    flex-wrap: wrap;
  }
  .section-nav::-webkit-scrollbar { display: none; }

  .nav-btn {
    padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border); background: transparent;
    color: var(--text-dim); font-size: 12px; cursor: pointer;
    transition: all 0.2s; white-space: nowrap; font-family: inherit;
  }
  .nav-btn:hover { border-color: var(--purple-light); color: var(--text); }
  .nav-btn.active { background: var(--purple); border-color: var(--purple); color: white; }
  .nav-btn.complete { border-color: var(--green); color: var(--green); }
  .nav-btn.todo-btn {
    border-color: rgba(10,191,188,0.4); color: #0ABFBC;
    background: rgba(10,191,188,0.08); font-weight: 600;
  }
  .nav-btn.todo-btn:hover { background: rgba(10,191,188,0.18); }

  main { max-width: 860px; margin: 0 auto; padding: 32px 24px 100px; }

  .section { margin-bottom: 40px; }

  .section-header {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 12px; padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }

  .section-badge {
    width: 28px; height: 28px;
    background: linear-gradient(135deg, #07908E, #0ABFBC);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 800; color: white; flex-shrink: 0;
  }

  .section-title { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }
  .section-progress { font-size: 12px; color: var(--text-dim); }

  .task {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 11px 14px; border-radius: var(--radius);
    cursor: pointer; transition: background 0.15s;
    user-select: none; margin-bottom: 3px;
    border: 1px solid transparent;
  }
  .task:hover { background: var(--surface2); border-color: var(--border); }
  .task.done { background: var(--done-bg); border-color: transparent; }
  .task.done:hover { border-color: #2a3a2a; }

  .checkbox {
    width: 20px; height: 20px; border-radius: 5px;
    border: 2px solid var(--border); flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s; background: transparent;
  }
  .task:hover .checkbox { border-color: var(--purple-light); }
  .task.done .checkbox { background: var(--green); border-color: var(--green); }
  .check-icon { display: none; color: #0d1a0d; font-size: 12px; font-weight: 900; line-height: 1; }
  .task.done .check-icon { display: block; }

  .task-label { flex: 1; }
  .task-id { font-size: 11px; font-weight: 700; color: var(--purple-light); margin-bottom: 2px; font-family: 'Courier New', monospace; letter-spacing: 0.5px; }
  .task.done .task-id { color: var(--done-text); }
  .task-name { font-size: 14px; color: var(--text); line-height: 1.4; transition: all 0.2s; }
  .task.done .task-name { color: var(--done-text); text-decoration: line-through; text-decoration-color: #3a5a3a; }
  .task-type { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .task.done .task-type { color: #2a3a2a; }

  .badge {
    display: inline-block; font-size: 9px; font-weight: 700;
    padding: 1px 5px; border-radius: 4px; margin-left: 6px;
    vertical-align: middle; letter-spacing: 0.3px;
  }
  .badge-neu  { background: rgba(10,191,188,0.18); color: #4DD9D7; border: 1px solid rgba(10,191,188,0.3); }
  .badge-fix  { background: rgba(239,68,68,0.18);  color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .badge-sec  { background: rgba(245,158,11,0.18); color: #fbbf24; border: 1px solid rgba(245,158,11,0.3); }
  .task.done .badge { background: rgba(58,90,74,0.3); color: #3a5a4a; border-color: #2a3a2a; }

  .task-note { font-size: 11px; color: var(--text-dim); margin-top: 3px; line-height: 1.4; font-style: italic; }
  .task.done .task-note { color: #2a3a2a; }

  .fab-group {
    position: fixed; bottom: 24px; right: 24px;
    display: flex; flex-direction: column; gap: 8px; align-items: flex-end;
  }
  .fab-btn {
    padding: 10px 16px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text-dim); font-size: 12px; cursor: pointer;
    font-family: inherit; transition: all 0.2s; white-space: nowrap;
  }
  .fab-btn:hover { border-color: var(--purple-light); color: var(--text); }
  .fab-btn.danger:hover { border-color: #ff6b6b; color: #ff6b6b; }
  .fab-btn.primary { border-color: #0ABFBC; color: #4DD9D7; background: rgba(10,191,188,0.12); }
  .fab-btn.primary:hover { background: rgba(10,191,188,0.25); }

  .sync-toast {
    position: fixed; bottom: 140px; right: 24px;
    background: var(--green); color: #0d1a0d;
    padding: 10px 16px; border-radius: 8px;
    font-size: 13px; font-weight: 600;
    display: none; animation: fadeInOut 2s ease forwards;
  }

  @keyframes fadeInOut {
    0%   { opacity: 0; transform: translateY(8px); }
    20%  { opacity: 1; transform: translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .section-done {
    text-align: center; padding: 12px; color: var(--green);
    font-size: 13px; opacity: 0; transition: opacity 0.4s;
  }
  .section-done.visible { opacity: 1; }

  .week-tag {
    font-size: 10px; padding: 2px 7px; border-radius: 10px; font-weight: 600;
    background: rgba(10,191,188,0.12); color: #0ABFBC;
    border: 1px solid rgba(10,191,188,0.25);
  }

  .section-info {
    font-size: 12px; color: var(--text-dim);
    padding: 8px 14px; border-left: 2px solid var(--border);
    margin-bottom: 8px; line-height: 1.5;
  }

  .section-header {
    cursor: pointer;
  }
  .section-header:hover .section-title { color: var(--purple-light); }

  .todo-add {
    display: flex; gap: 8px; margin-bottom: 16px;
  }
  .todo-add input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 9px 14px; color: var(--text);
    font-family: inherit; font-size: 13px; outline: none;
    transition: border-color 0.2s;
  }
  .todo-add input:focus { border-color: var(--purple-light); }
  .todo-add input::placeholder { color: var(--text-dim); }
  .todo-add button {
    padding: 9px 16px; border-radius: 8px;
    background: rgba(10,191,188,0.15); border: 1px solid #0ABFBC;
    color: #4DD9D7; font-family: inherit; font-size: 13px;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .todo-add button:hover { background: rgba(10,191,188,0.28); }

  .todo-item {
    display: flex; align-items: flex-start; gap: 10px;
    padding: 9px 12px; border-radius: 8px;
    border: 1px solid transparent; margin-bottom: 3px;
    cursor: pointer; transition: background 0.15s;
  }
  .todo-item:hover { background: var(--surface2); border-color: var(--border); }
  .todo-item.done { opacity: 0.45; }
  .todo-item.done .todo-item-text { text-decoration: line-through; color: var(--done-text); }

  .todo-item-text { flex: 1; font-size: 13px; line-height: 1.4; }
  .todo-item-del {
    font-size: 14px; color: var(--text-dim); cursor: pointer;
    padding: 0 4px; line-height: 1; flex-shrink: 0;
    transition: color 0.15s;
  }
  .todo-item-del:hover { color: #ff6b6b; }

  .todo-empty { font-size: 12px; color: var(--text-dim); padding: 8px 0; }

  .section-toggle {
    font-size: 11px; color: var(--text-dim);
    margin-left: auto; padding-right: 4px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .section.open .section-toggle { transform: rotate(90deg); }

  .section-body {
    display: none;
    animation: fadeIn 0.15s ease;
  }
  .section.open .section-body { display: block; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-4px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="logo">
      <div class="logo-dot">F</div>
      <h1>Flovr <span>Aufbau-Checkliste</span></h1>
      <span class="version-tag">v2.0</span>
    </div>
    <div class="stats">
      <div class="stat">
        <div class="stat-num" id="done-count">0</div>
        <div class="stat-label">Erledigt</div>
      </div>
      <div class="stat">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Gesamt</div>
      </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>
</header>

<nav class="section-nav" id="section-nav"></nav>
<main id="main"></main>
<div class="sync-toast" id="sync-toast">Link kopiert!</div>

<div class="fab-group">
  <button class="fab-btn primary" onclick="syncLink()">📋 Sync-Link kopieren</button>
  <button class="fab-btn danger" onclick="resetAll()">Zurücksetzen</button>
</div>

const STATE_KEY = 'flovr-checklist-v2';

function loadState() {
  try {
    const v1 = localStorage.getItem('flovr-checklist-v1');
    const v2 = localStorage.getItem(STATE_KEY);
    if (v1 && !v2) { localStorage.setItem(STATE_KEY, v1); return JSON.parse(v1); }
    return JSON.parse(v2 || '{}');
  } catch { return {}; }
}

function saveState(s) { localStorage.setItem(STATE_KEY, JSON.stringify(s)); }

let state = loadState();

const TODO_KEY = 'flovr-todos';
function loadTodos() { try { return JSON.parse(localStorage.getItem(TODO_KEY) || '[]'); } catch { return []; } }
function saveTodos(t) { localStorage.setItem(TODO_KEY, JSON.stringify(t)); }
let todos = loadTodos();

function buildTodoSection(mainEl) {
  const sec = document.createElement('div');
  sec.className = 'section';
  sec.id = 'sec-TODO';

  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <div class="section-badge" style="background:linear-gradient(135deg,#0ABFBC,#4DD9D7);font-size:9px;width:32px">TODO</div>
    <div class="section-title">OFFENE PUNKTE — Notizen</div>
    <div class="section-progress" id="prog-TODO">–</div>
    <span class="section-toggle">▶</span>
  `;
  header.onclick = () => sec.classList.toggle('open');
  sec.appendChild(header);

  const body = document.createElement('div');
  body.className = 'section-body';
  body.id = 'todo-body';
  body.innerHTML = `
    <div class="todo-add">
      <input id="todo-input" type="text" placeholder="Neuen Punkt hinzufügen…" maxlength="200">
      <button onclick="addTodo()">+ Hinzufügen</button>
    </div>
    <div id="todo-list"></div>
  `;
  sec.appendChild(body);
  mainEl.appendChild(sec);
}

function renderTodos() {
  const list = document.getElementById('todo-list');
  if (!list) return;
  if (todos.length === 0) {
    list.innerHTML = '<div class="todo-empty">Noch keine Einträge — einfach oben eintragen.</div>';
  } else {
    list.innerHTML = '';
    todos.forEach((item, i) => {
      const el = document.createElement('div');
      el.className = 'todo-item' + (item.done ? ' done' : '');
      el.innerHTML = `
        <div class="checkbox" onclick="toggleTodo(${i});event.stopPropagation()"><span class="check-icon">✓</span></div>
        <div class="todo-item-text">${escHtml(item.text)}</div>
        <span class="todo-item-del" onclick="deleteTodo(${i});event.stopPropagation()" title="Löschen">✕</span>
      `;
      list.appendChild(el);
    });
  }
  const done = todos.filter(t => t.done).length;
  const prog = document.getElementById('prog-TODO');
  if (prog) prog.textContent = todos.length ? done + '/' + todos.length : '–';
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function addTodo() {
  const inp = document.getElementById('todo-input');
  const text = inp.value.trim();
  if (!text) return;
  todos.push({ text, done: false });
  saveTodos(todos);
  inp.value = '';
  renderTodos();
}

function toggleTodo(i) {
  todos[i].done = !todos[i].done;
  saveTodos(todos);
  renderTodos();
}

function deleteTodo(i) {
  todos.splice(i, 1);
  saveTodos(todos);
  renderTodos();
}

function updateTodoProgress() { renderTodos(); }

function build() {
  const nav = document.getElementById('section-nav');
  const mainEl = document.getElementById('main');
  nav.innerHTML = '';
  mainEl.innerHTML = '';
  let totalTasks = 0;

  // TODO Übersichts-Button ganz vorne
  const todoBtn = document.createElement('button');
  todoBtn.className = 'nav-btn todo-btn';
  todoBtn.textContent = '📋 TODO';
  todoBtn.title = 'Alle offenen Punkte';
  todoBtn.onclick = () => {
    const el = document.getElementById('sec-TODO');
    el.classList.add('open');
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  };
  nav.appendChild(todoBtn);

  buildTodoSection(mainEl);

  SECTIONS.forEach(section => {
    totalTasks += section.tasks.length;
    const done = section.tasks.filter(t => state[t.id]).length;
    const allDone = done === section.tasks.length;

    const btn = document.createElement('button');
    btn.className = 'nav-btn' + (allDone ? ' complete' : '');
    btn.textContent = section.id + (allDone ? ' ✓' : '');
    btn.title = section.title;
    btn.onclick = () => {
      const el = document.getElementById('sec-' + section.id);
      el.classList.add('open');
      el.scrollIntoView({ behavior: 'smooth', block: 'start' });
    };
    nav.appendChild(btn);

    const sec = document.createElement('div');
    sec.className = 'section';
    sec.id = 'sec-' + section.id;

    const header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML = `
      <div class="section-badge">${section.id}</div>
      <div class="section-title">${section.title}</div>
      <span class="week-tag">${section.week}</span>
      <div class="section-progress" id="prog-${section.id}">${done}/${section.tasks.length}</div>
      <span class="section-toggle">▶</span>
    `;
    header.onclick = () => sec.classList.toggle('open');
    sec.appendChild(header);

    const body = document.createElement('div');
    body.className = 'section-body';
    if (section.info) {
      const info = document.createElement('div');
      info.className = 'section-info';
      info.textContent = section.info;
      body.appendChild(info);
    }

    section.tasks.forEach(task => {
      const isDone = !!state[task.id];
      const el = document.createElement('div');
      el.className = 'task' + (isDone ? ' done' : '');
      el.id = 'task-' + task.id;

      const badges = [
        task.neu ? '<span class="badge badge-neu">★ NEU</span>' : '',
        task.fix ? '<span class="badge badge-fix">BUGFIX</span>' : '',
        task.sec ? '<span class="badge badge-sec">SECURITY</span>' : '',
      ].join('');

      el.innerHTML = `
        <div class="checkbox"><span class="check-icon">✓</span></div>
        <div class="task-label">
          <div class="task-id">${task.id}</div>
          <div class="task-name">${task.name}${badges}</div>
          <div class="task-type">${task.type}</div>
          ${task.note ? `<div class="task-note">${task.note}</div>` : ''}
        </div>
      `;
      el.onclick = () => toggle(task.id, section);
      body.appendChild(el);
    });

    const doneNotice = document.createElement('div');
    doneNotice.className = 'section-done' + (allDone ? ' visible' : '');
    doneNotice.id = 'done-' + section.id;
    doneNotice.textContent = '✓ Sektion ' + section.id + ' abgeschlossen';
    body.appendChild(doneNotice);
    sec.appendChild(body);

    mainEl.appendChild(sec);
  });

  document.getElementById('total-count').textContent = totalTasks;
  updateStats();
  updateTodoProgress();
}

function toggle(taskId, section) {
  state[taskId] = !state[taskId];
  saveState(state);

  const el = document.getElementById('task-' + taskId);
  if (el) el.classList.toggle('done', state[taskId]);

  const done = section.tasks.filter(t => state[t.id]).length;
  const allDone = done === section.tasks.length;
  const prog = document.getElementById('prog-' + section.id);
  if (prog) prog.textContent = done + '/' + section.tasks.length;

  const notice = document.getElementById('done-' + section.id);
  if (notice) notice.classList.toggle('visible', allDone);

  document.querySelectorAll('.nav-btn').forEach(btn => {
    if (btn.title === section.title) {
      btn.className = 'nav-btn' + (allDone ? ' complete' : '');
      btn.textContent = section.id + (allDone ? ' ✓' : '');
    }
  });

  updateStats();
  updateTodoProgress();
}


function updateStats() {
  const allTasks = SECTIONS.flatMap(s => s.tasks);
  const doneCount = allTasks.filter(t => state[t.id]).length;
  const total = allTasks.length;
  document.getElementById('done-count').textContent = doneCount;
  document.getElementById('total-count').textContent = total;
  document.getElementById('progress-bar').style.width = (doneCount / total * 100) + '%';
}

function syncLink() {
  const encoded = btoa(JSON.stringify(state));
  const url = location.origin + location.pathname + '#sync=' + encoded;
  navigator.clipboard.writeText(url).then(() => {
    const toast = document.getElementById('sync-toast');
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 2000);
  }).catch(() => prompt('Link kopieren:', url));
}

function loadFromHash() {
  const hash = location.hash;
  if (!hash.startsWith('#sync=')) return;
  try {
    const imported = JSON.parse(atob(hash.slice(6)));
    if (confirm('Sync-Link erkannt — Fortschritt übernehmen?')) {
      state = imported;
      saveState(state);
      history.replaceState(null, '', location.pathname);
    }
  } catch {}
}

function resetAll() {
  if (!confirm('Wirklich alle Checkboxen zurücksetzen?')) return;
  state = {};
  saveState(state);
  build();
}

loadFromHash();
build();
renderTodos();
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.activeElement?.id === 'todo-input') addTodo();
});
</script>
