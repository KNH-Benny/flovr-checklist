<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flovr Setup Checkliste</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:    #0ABFBC;
      --teal-d:  #07908E;
      --teal-l:  #4DD9D7;
      --bg:      #0A1A1A;
      --bg2:     #0F2222;
      --bg3:     #162E2E;
      --border:  #1A3A3A;
      --text:    #D8EFEF;
      --muted:   #5A8888;
      --done:    #2A4A4A;
      --done-t:  #5A8A8A;
      --red:     #FF6B6B;
    }

    html { font-size: 16px; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      line-height: 1.6;
      min-height: 100vh;
    }

    header {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      flex-wrap: wrap;
    }

    .header-left h1 { font-size: 1.25rem; font-weight: 700; color: var(--teal); letter-spacing: -0.02em; }
    .header-left p  { font-size: 0.78rem; color: var(--muted); margin-top: 0.1rem; }

    .progress-wrap { display: flex; align-items: center; gap: 0.75rem; flex-shrink: 0; }

    .progress-bar {
      width: 140px; height: 6px;
      background: var(--border); border-radius: 3px; overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--teal-d), var(--teal-l));
      border-radius: 3px; transition: width 0.3s ease; width: 0%;
    }

    .progress-label { font-size: 0.8rem; color: var(--teal); font-weight: 600; min-width: 3.5rem; text-align: right; }

    main { max-width: 860px; margin: 0 auto; padding: 1.5rem 1rem 4rem; }

    .summary {
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; padding: 1rem 1.25rem;
      margin-bottom: 1.5rem; display: flex; gap: 2rem; flex-wrap: wrap;
    }

    .stat { text-align: center; }
    .stat-num  { font-size: 1.6rem; font-weight: 800; color: var(--teal); line-height: 1; }
    .stat-label{ font-size: 0.72rem; color: var(--muted); margin-top: 0.2rem; }

    .section { margin-bottom: 1.5rem; border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }

    .section-header {
      background: var(--bg2); padding: 0.75rem 1rem;
      display: flex; align-items: center; justify-content: space-between;
      cursor: pointer; user-select: none; gap: 0.75rem;
    }
    .section-header:hover { background: var(--bg3); }

    .section-title { font-size: 0.9rem; font-weight: 700; color: var(--teal); }

    .section-badge {
      font-size: 0.7rem; background: var(--bg3); border: 1px solid var(--border);
      color: var(--muted); padding: 0.15rem 0.45rem; border-radius: 4px; font-weight: 500;
    }
    .section-badge.all-done { background: rgba(10,191,188,0.1); border-color: var(--teal-d); color: var(--teal); }

    .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; flex-shrink: 0; }
    .section.collapsed .chevron { transform: rotate(-90deg); }
    .section-body { padding: 0.25rem 0; }
    .section.collapsed .section-body { display: none; }

    .item {
      display: flex; align-items: flex-start; gap: 0.75rem;
      padding: 0.55rem 1rem; border-bottom: 1px solid var(--border);
      cursor: pointer; transition: background 0.15s;
    }
    .item:last-child { border-bottom: none; }
    .item:hover      { background: var(--bg3); }
    .item.done       { background: var(--done); }
    .item.done:hover { background: #2e5252; }

    .cb {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 2px solid var(--border); border-radius: 4px; margin-top: 0.15rem;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; background: var(--bg2);
    }
    .item.done .cb { background: var(--teal); border-color: var(--teal); }
    .cb-check { display: none; color: var(--bg); font-size: 11px; font-weight: 900; line-height: 1; }
    .item.done .cb-check { display: block; }

    .item-content { flex: 1; min-width: 0; }
    .item-id   { font-size: 0.7rem; font-weight: 700; color: var(--teal-d); margin-bottom: 0.05rem; font-family: 'SF Mono','Fira Code',monospace; }
    .item-text { font-size: 0.875rem; color: var(--text); line-height: 1.4; }
    .item.done .item-text { color: var(--done-t); text-decoration: line-through; text-decoration-color: var(--done-t); }
    .item-note { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; font-style: italic; }

    .reset-btn {
      display: block; margin: 2rem auto 0; padding: 0.5rem 1.25rem;
      background: transparent; border: 1px solid var(--border); color: var(--muted);
      border-radius: 6px; font-size: 0.8rem; cursor: pointer; transition: all 0.15s;
    }
    .reset-btn:hover { border-color: var(--red); color: var(--red); }

    @media (max-width: 480px) {
      header { padding: 1rem; }
      .progress-bar { width: 100px; }
      main { padding: 1rem 0.75rem 3rem; }
      .item { padding: 0.55rem 0.75rem; }
      .section-header { padding: 0.65rem 0.75rem; }
      .summary { gap: 1.25rem; }
    }
  </style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Flovr Setup Checkliste</h1>
    <p>Von Null bis Production</p>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    <div class="progress-label" id="progressLabel">0%</div>
  </div>
</header>

<main>
  <div class="summary">
    <div class="stat"><div class="stat-num" id="statDone">0</div><div class="stat-label">erledigt</div></div>
    <div class="stat"><div class="stat-num" id="statOpen">0</div><div class="stat-label">offen</div></div>
    <div class="stat"><div class="stat-num" id="statTotal">0</div><div class="stat-label">gesamt</div></div>
  </div>
  <div id="app"></div>
  <button class="reset-btn" onclick="resetAll()">Alle Haken zurücksetzen</button>
</main>

<script>
const SECTIONS = [
  { id:'A', title:'A · Infrastruktur — VPS & Server-Setup', items:[
    { id:'A-01',  text:'VPS bestellen',                                          note:'netcup VPS 500 G12' },
    { id:'A-02',  text:'Erster SSH-Login & System absichern',                    note:'Key-Auth, Root-Login deaktivieren, UFW einrichten' },
    { id:'A-03',  text:'fail2ban konfigurieren',                                 note:'bash backend/setup/fail2ban_install.sh' },
    { id:'A-04',  text:'nginx + PHP 8.3 + MariaDB installieren',                 note:'sudo bash backend/setup/server_install.sh' },
    { id:'A-05',  text:'nginx vHost-Configs aktivieren',                         note:'api.flovr.de, app.flovr.de, flovr.de' },
    { id:'A-06',  text:'SSL-Zertifikate ausstellen',                             note:'certbot --nginx -d api.flovr.de -d app.flovr.de -d flovr.de' },
    { id:'A-07',  text:'/etc/flovr/.env anlegen + alle CHANGE_ME befüllen',      note:'DB_PASS, JWT_SECRET, APP_KEY' },
    { id:'A-08',  text:'MariaDB einrichten',                                     note:'flovr_db anlegen, flovr_user erstellen, Rechte vergeben' },
    { id:'A-09a', text:'GitHub Actions CI/CD Pipeline testen',                   note:'Push auf main → GitHub Actions Tab → Deploy-Job prüfen' },
    { id:'A-09b', text:'TODO C-01 in deploy.yml: Health-Check einkommentieren',  note:'Erst nach Backend-Setup (C-02) aktivieren' },
    { id:'A-10a', text:'Staging-Umgebung auf VPS einrichten',                    note:'sudo bash backend/setup/staging_setup.sh' },
    { id:'A-10b', text:'Staging SSL-Zertifikat ausstellen',                      note:'certbot --nginx -d api-staging.flovr.de -d app-staging.flovr.de' },
    { id:'A-10c', text:'GitHub Environment "production" mit Required Reviewer',  note:'Erst relevant wenn zweiter Deployer dazu kommt — GitHub → Settings → Environments → production → Required reviewers' },
    { id:'A-11a', text:'Block Storage /dev/vdb formatieren + als /mnt/backup mounten', note:'mkfs.ext4 /dev/vdb → /etc/fstab eintragen → df -h /mnt/backup prüft 100G' },
    { id:'A-11b', text:'Backup-System installieren',                             note:'git pull && bash backend/setup/backup/backup_install.sh' },
    { id:'A-11c', text:'Backup manuell testen',                                  note:'bash /usr/local/bin/flovr-backup.sh → ls -lh /mnt/backup/flovr/' },
  ]},
  { id:'B', title:'B · Datenbank — Schema & Migration', items:[
    { id:'B-01', text:'Vollständiges MariaDB-Schema ausführen',  note:'28 Tabellen, Multi-Tenant, utf8mb4, AES-256 für DSGVO-Felder' },
    { id:'B-02', text:'Seed-Daten einspielen',                   note:'Rollen + Presets' },
    { id:'B-03', text:'Migrations-System einrichten',            note:'Inkrementelle SQL-Migrations, nur neue laufen' },
  ]},
  { id:'C', title:'C · Backend — PHP Router & Auth', items:[
    { id:'C-01', text:'Verzeichnis-Struktur + Router implementieren', note:'backend/public/index.php, Middleware-Chain, Front-Controller' },
    { id:'C-02', text:'Auth-System vollständig',                      note:'Login, JWT, Refresh-Token, Logout, /api/auth/me' },
  ]},
  { id:'D', title:'D · Security — Bereinigung', items:[
    { id:'D-01', text:'Demo-Users entfernen, Apps Script URL aus Code, Google Fonts lokal', note:'Keine Hardcoded-Credentials, keine externe Fontquelle' },
    { id:'D-02', text:'Git History bereinigen',                                              note:'Falls Secrets committed wurden: BFG Repo-Cleaner + force-push' },
  ]},
  { id:'E', title:'E · Storage — Uploads', items:[
    { id:'E-01', text:'StorageInterface + Local Provider implementieren', note:'Interface-Pattern für späteren gdrive/S3-Wechsel' },
    { id:'E-02', text:'Upload-Endpunkte',                                 note:'Avatar, Dokumente — mit X-Accel-Redirect für sichere Downloads' },
    { id:'E-03', text:'Google Drive Setup (optional)',                    note:'Nur wenn gdrive als Storage-Provider gewählt wird' },
  ]},
  { id:'F', title:'F · API — 55 REST-Endpunkte', items:[
    { id:'F-01', text:'Organisation & Org-Config',           note:'GET/PUT /api/org, Tenant-Setup' },
    { id:'F-02', text:'Mitglieder-Endpunkte',                note:'CRUD, Rollen, Status, Suche' },
    { id:'F-03', text:'Projekte-Endpunkte',                  note:'CRUD, Typen, Mitglieder-Zuweisung' },
    { id:'F-04', text:'Schichten-Endpunkte',                 note:'Planung, Buchung, Bestätigung, Konflikt-Check' },
    { id:'F-05', text:'Aufgaben, Ideen, Feed',               note:'Aufgaben-Board, Ideen-Voting, Activity-Feed' },
    { id:'F-06', text:'Protokolle',                          note:'Erstellen, Unterzeichnen, PDF-Export' },
    { id:'F-07', text:'Inventar & Archiv',                   note:'CRUD Inventar, Archiv-Endpunkte' },
    { id:'F-08', text:'Admin-Endpunkte & Mitgliedsanträge',  note:'Antrags-Workflow, Genehmigung, Ablehnung' },
    { id:'F-09', text:'Social Media Planer',                 note:'Posts planen, Status, Kanal-Verwaltung' },
    { id:'F-10', text:'Team-Verwaltung',                     note:'Teams, Rollen, Mitglieder-Zuweisung' },
  ]},
  { id:'G', title:'G · Frontend — API-Anbindung', items:[
    { id:'G-01', text:'API-Client + Org-Config laden',                        note:'CFG-Platzhalter ersetzen, fetch-Wrapper' },
    { id:'G-02', text:'Auth-Anbindung',                                       note:'Login, Logout, Token-Refresh, Auth-Guard' },
    { id:'G-03', text:'Projekte, Schichten, Feed von API laden',              note:'React-Hooks, Loading-States, Error-Handling' },
    { id:'G-04', text:'Mitglieder, Aufgaben, Protokolle, Inventar',           note:'Alle verbleibenden Tabs an API anbinden' },
  ]},
  { id:'H', title:'H · UI — Bug-Fixes & Design System', items:[
    { id:'H-01', text:'10 bekannte Bugs fixen',                      note:'Dokumentierte Bugs aus Testsession' },
    { id:'H-02', text:'Next-Level UI — Design System',               note:'Tokens, Komponenten-Library, konsistentes Styling' },
    { id:'H-03', text:'Owner-Panel vollständig',                     note:'Org-Config, Mitgliederverwaltung, Rollen, Einladungen' },
    { id:'H-04', text:'Projekt-Typen dynamisch + UI-Polish',         note:'Dynamische Typen aus Org-Config, Animations' },
    { id:'H-05', text:'Mobile-Optimierung & Performance',            note:'Core Web Vitals, Touch-Gesten, PWA-Manifest' },
    { id:'H-06', text:'Social Media Tab — Redaktionskalender',       note:'Drag & Drop, Kanal-Icons, Preview' },
    { id:'H-07', text:'Team-Workspace — Eigenständiger Bereich',     note:'Team-Feed, Team-Aufgaben, Team-Kalender' },
  ]},
  { id:'I', title:'I · KI — Claude API Integration', items:[
    { id:'I-01', text:'Template-System Backend',                   note:'Claude API für Inhalts-Templates' },
    { id:'I-02', text:'Template-Auswahl im Projekt-Wizard',        note:'KI-generierte Vorschläge beim Projekt erstellen' },
    { id:'I-03', text:'Automation-Trigger (Connected Actions)',    note:'Wenn X → KI macht Y' },
    { id:'I-04', text:'Smart Defaults & Progressive Disclosure',   note:'KI füllt Felder vor, blendet Komplexität aus' },
  ]},
  { id:'J', title:'J · DSGVO — Export & Löschung', items:[
    { id:'J-01', text:'Export & Löschung Backend', note:'Art. 17 Löschrecht, Art. 20 Datenportabilität — JSON-Export' },
    { id:'J-02', text:'DSGVO-UI im Profil',        note:'Daten-Export-Button, Konto löschen, Einwilligungen verwalten' },
  ]},
  { id:'K', title:'K · Betrieb — Monitoring & Crons', items:[
    { id:'K-01', text:'Security Headers + Rate Limiting', note:'CSP, HSTS, X-Frame, Rate-Limiting für alle API-Endpunkte' },
    { id:'K-02', text:'Monitoring & Health',               note:'Uptime-Check, Disk-Alarm bei >85%, DB-Check, /api/health' },
  ]},
  { id:'L', title:'L · Launch — KNH-Setup & Checkliste', items:[
    { id:'L-01', text:'EasyVerein-Import',                    note:'Mitglieder aus EasyVerein in flovr_db importieren' },
    { id:'L-02', text:'KNH Org-Config einrichten',            note:'Name, Logo, Farben, Rollen, Abteilungen' },
    { id:'L-03', text:'Ersten Owner-Account aktivieren',      note:'Account verifizieren, Org-Admin-Rolle setzen' },
    { id:'L-04', text:'IS_LIVE=true in .env setzen',          note:'Schaltet Registrierung frei, deaktiviert Debug-Mode' },
    { id:'L-05', text:'Launch-Checkliste vollständig',        note:'Alle L-05 Checkpunkte durchgehen' },
  ]},
  { id:'M', title:'M · Zukunft — Vision', items:[
    { id:'M-01', text:'Chat-Funktion (WebSockets)',            note:'Echtzeit-Nachrichten, Gruppen-Channels' },
    { id:'M-02', text:'Finanz-Tool-Koop',                     note:'Kein eigener Tab — Integration mit externem Tool' },
    { id:'M-04', text:'Kalender-API-Anbindung',               note:'Google Calendar / iCal Export/Import' },
    { id:'M-05', text:'Meetings & Audio-Transkription',       note:'Vision: Automatische Protokolle aus Aufnahmen' },
  ]},
  { id:'N', title:'N · Modul-Builder', items:[
    { id:'N-01', text:'Modul-Builder Backend',             note:'Dynamische Felder, Custom-Module pro Org' },
    { id:'N-02', text:'Modul-Builder Frontend',            note:'Drag & Drop Modul-Editor im Owner-Panel' },
  ]},
  { id:'O', title:'O · Template-System', items:[
    { id:'O-01', text:'Template-System Backend',           note:'Template-Definitionen, Versions-Tracking' },
    { id:'O-02', text:'KNH Kulturverein Template',         note:'Aus KNH-App extrahieren und als Template paketieren' },
    { id:'O-03', text:'Onboarding-Flow mit Template-Auswahl', note:'Neues Setup wählt Template → befüllt Org automatisch' },
  ]},
  { id:'P', title:'P · Template-Marketplace', items:[
    { id:'P-01', text:'Template-Registry Backend',         note:'Öffentliche Registry, Versionierung, Rating' },
    { id:'P-02', text:'Clickbarer Preview ohne Account',   note:'Read-only Demo mit echten Daten' },
    { id:'P-03', text:'Market-Frontend',                   note:'Browse, Filter, 1-Click-Install' },
    { id:'P-04', text:'Virale Loops',                      note:'Referral-System, Empfehlungs-Tracking' },
  ]},
];

const KEY = 'flovr-checklist-v1';
function loadState() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch { return {}; } }
function saveState(s) { localStorage.setItem(KEY, JSON.stringify(s)); }

let state = loadState();

function toggleItem(id)    { state[id] = !state[id]; saveState(state); render(); }
function toggleSection(id) { state['__sec_'+id] = !state['__sec_'+id]; saveState(state); render(); }
function resetAll()        { if (!confirm('Alle Haken zurücksetzen?')) return; state = {}; saveState(state); render(); }

function render() {
  const total    = SECTIONS.reduce((s, sec) => s + sec.items.length, 0);
  const done     = SECTIONS.reduce((s, sec) => s + sec.items.filter(i => state[i.id]).length, 0);
  const pct      = total ? Math.round(done / total * 100) : 0;

  document.getElementById('progressFill').style.width  = pct + '%';
  document.getElementById('progressLabel').textContent = pct + '%';
  document.getElementById('statDone').textContent  = done;
  document.getElementById('statOpen').textContent  = total - done;
  document.getElementById('statTotal').textContent = total;

  document.getElementById('app').innerHTML = SECTIONS.map(sec => {
    const secDone   = sec.items.filter(i => state[i.id]).length;
    const allDone   = secDone === sec.items.length;
    const collapsed = state['__sec_'+sec.id] ? 'collapsed' : '';

    return `
      <div class="section ${collapsed}">
        <div class="section-header" onclick="toggleSection('${sec.id}')">
          <div class="section-title">${sec.title}</div>
          <div style="display:flex;align-items:center;gap:0.5rem">
            <span class="section-badge ${allDone?'all-done':''}">${secDone}/${sec.items.length}</span>
            <span class="chevron">▼</span>
          </div>
        </div>
        <div class="section-body">
          ${sec.items.map(item => `
            <div class="item ${state[item.id]?'done':''}" onclick="toggleItem('${item.id}')">
              <div class="cb"><span class="cb-check">✓</span></div>
              <div class="item-content">
                <div class="item-id">${item.id}</div>
                <div class="item-text">${item.text}</div>
                ${item.note ? `<div class="item-note">${item.note}</div>` : ''}
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }).join('');
}

render();
</script>
</body>
</html>
